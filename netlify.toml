[build]
  # Chromium VOR dem Build explizit in den persistenten Cache installieren. PUPPETEER_CACHE_DIR
  # (s.u.) allein reicht nicht: bei `npm ci` mit restauriertem node_modules-Cache laeuft Puppeteers
  # postinstall-Download nicht zuverlaessig, und der Prerender findet keinen Browser (Vorfall 17.07.).
  # `puppeteer browsers install chrome` laedt idempotent in PUPPETEER_CACHE_DIR — beim 1. Build echt,
  # danach Cache-Treffer. Lokal unnoetig, daher hier statt in package.json (npm run build bleibt clean).
  command   = "npx puppeteer browsers install chrome && npm run build"
  publish   = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# Node-Version festnageln (17.07., mit Umstellung auf Git-Auto-Build): ohne diesen Pin nimmt
# Netlify seine Default-Version, die nicht die lokal getestete sein muss — die klassische
# Quelle fuer "lokal baut es, auf Netlify nicht". 24 = die Version, mit der der Build hier
# verifiziert wurde (52 Routen, 0 Fehler). package-lock.json ist getrackt, damit sind auch
# die Pakete reproduzierbar.
[build.environment]
  NODE_VERSION = "24"
  # Puppeteer laedt sein Chromium normalerweise nach ~/.cache/puppeteer — das ueberlebt im
  # Netlify-Container den Schritt von install zu build NICHT, und der Prerender findet keinen
  # Browser. Auf den PERSISTENTEN Build-Cache zeigen: Chromium wird beim install dorthin
  # geladen und beim build von genau dort gefunden. (Vorfall 17.07.: 7 h rohe SPA live, weil
  # genau das fehlte.) Der Build-Guard in prerender.mjs laesst den Build fehlschlagen, falls
  # der Browser trotzdem nicht startet — dann bleibt der letzte gute Deploy stehen.
  PUPPETEER_CACHE_DIR = "/opt/build/cache/puppeteer"

# Edge function injects OG meta tags server-side for LinkedIn/social scrapers
[[edge_functions]]
  path = "/mentaler-schutzschild"
  function = "og-inject"

[[edge_functions]]
  path = "/krisensicheres-zuhause-fuer-familien"
  function = "og-inject"

# Language prefix redirects — /bg/ and /de/ are not URL-based routes, redirect to root
[[redirects]]
  from   = "/bg"
  to     = "/"
  status = 301
  force  = true

[[redirects]]
  from   = "/bg/*"
  to     = "/"
  status = 301
  force  = true

[[redirects]]
  from   = "/de"
  to     = "/"
  status = 301
  force  = true

[[redirects]]
  from   = "/de/*"
  to     = "/"
  status = 301
  force  = true

# Canonical redirect — /e-books is duplicate of /ebooks
[[redirects]]
  from   = "/e-books"
  to     = "/ebooks"
  status = 301
  force  = true

# Renamed blog slugs — 301 to preserve link equity (2026-06-21, Sitemap-Soft-404-Fix)
[[redirects]]
  from   = "/blog/schimmel-im-winter"
  to     = "/blog/schimmel-im-winter-erkennen"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/feuchtigkeit-im-keller"
  to     = "/blog/feuchtigkeit-im-keller-beseitigen"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/krisensicheres-zuhause"
  to     = "/blog/krisensicheres-zuhause-fuer-familien"
  status = 301
  force  = true

# SPA fallback – rewrites all routes to index.html (status 200 = rewrite, NOT redirect)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false
